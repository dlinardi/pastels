<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>pastels banner</title>
  <defs>
    <linearGradient id="pastel" x1="72" y1="72" x2="168" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#cc6666"/>
      <stop offset="0.5" stop-color="#b294bb"/>
      <stop offset="1" stop-color="#8abeb7"/>
    </linearGradient>
    <clipPath id="sq">
      <rect x="72" y="72" width="96" height="96" rx="22"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="#282c34"/>

  <!-- centred lockup: the wordmark box (about 700 wide) scaled and centred -->
  <g transform="translate(330,232) scale(0.86)">
    <g transform="translate(0,0) scale(0.74)">
      <g clip-path="url(#sq)">
        <rect x="72" y="72" width="96" height="96" fill="url(#pastel)"/>
        <circle cx="99" cy="99" r="11" fill="#ffffff" opacity="0.85"/>
        <path d="M72 168 L104 126 L128 150 L150 132 L168 154 L168 168 Z" fill="#ffffff" opacity="0.22"/>
      </g>
      <path d="M62 54 H44 V186 H62" stroke="#c5c8c6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M178 54 H196 V186 H178" stroke="#c5c8c6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="208" y="150" font-family="'Berkeley Mono','JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace"
          font-size="116" font-weight="500" letter-spacing="-3" fill="#eaeaea">pastels</text>
  </g>

  <text x="640" y="452" text-anchor="middle"
        font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="28" fill="#8a8f99">see what you pasted</text>
</svg>
